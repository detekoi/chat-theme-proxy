name: Deploy to Cloud Run & Cloud Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVICE_NAME: theme-proxy
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  REPO_NAME: chat-theme-repo
  IMAGE_NAME: theme-proxy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-cloud-run:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and Push Docker image
        run: |-
          gcloud builds submit --tag ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} --quiet

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --quiet

  deploy-badge-functions:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy getGlobalBadges (2nd gen)
        run: |-
          gcloud functions deploy getGlobalBadges \
            --gen2 \
            --runtime nodejs22 \
            --region ${{ env.GCP_REGION }} \
            --source functions/badge-proxy \
            --entry-point getGlobalBadges \
            --trigger-http \
            --set-secrets TWITCH_CLIENT_ID=TWITCH_CLIENT_ID:latest,TWITCH_CLIENT_SECRET=TWITCH_CLIENT_SECRET:latest \
            --quiet

      - name: Deploy getChannelBadges (2nd gen)
        run: |-
          gcloud functions deploy getChannelBadges \
            --gen2 \
            --runtime nodejs22 \
            --region ${{ env.GCP_REGION }} \
            --source functions/badge-proxy \
            --entry-point getChannelBadges \
            --trigger-http \
            --set-secrets TWITCH_CLIENT_ID=TWITCH_CLIENT_ID:latest,TWITCH_CLIENT_SECRET=TWITCH_CLIENT_SECRET:latest \
            --quiet

      - name: Deploy refreshGlobalCache (2nd gen)
        run: |-
          gcloud functions deploy refreshGlobalCache \
            --gen2 \
            --runtime nodejs22 \
            --region ${{ env.GCP_REGION }} \
            --source functions/badge-proxy \
            --entry-point refreshGlobalCache \
            --trigger-http \
            --set-secrets TWITCH_CLIENT_ID=TWITCH_CLIENT_ID:latest,TWITCH_CLIENT_SECRET=TWITCH_CLIENT_SECRET:latest,INTERNAL_REFRESH_TOKEN=INTERNAL_REFRESH_TOKEN:latest \
            --quiet

      - name: Deploy getCheermotes (2nd gen)
        run: |-
          gcloud functions deploy getCheermotes \
            --gen2 \
            --runtime nodejs22 \
            --region ${{ env.GCP_REGION }} \
            --source functions/badge-proxy \
            --entry-point getCheermotes \
            --trigger-http \
            --set-secrets TWITCH_CLIENT_ID=TWITCH_CLIENT_ID:latest,TWITCH_CLIENT_SECRET=TWITCH_CLIENT_SECRET:latest \
            --quiet